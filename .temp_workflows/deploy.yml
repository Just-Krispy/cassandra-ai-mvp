name: Deploy to GitHub Pages

on:
  # Runs on pushes to main branch
  push:
    branches: [ main, master ]
  
  # Allows manual trigger from Actions tab
  workflow_dispatch:

# Sets permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Verify required files
        run: |
          echo "Checking for required files..."
          test -f index.html || (echo "❌ index.html missing" && exit 1)
          test -f api.js || (echo "❌ api.js missing" && exit 1)
          test -f tree-viz.js || (echo "❌ tree-viz.js missing" && exit 1)
          echo "✅ All required files present"
      
      - name: Security check (no API keys)
        run: |
          echo "Checking for exposed API keys..."
          if grep -r "sk-ant-" --exclude="*.yml" --exclude=".gitignore" --exclude="README.md" .; then
            echo "❌ DANGER: API key found in files!"
            exit 1
          fi
          echo "✅ No exposed API keys"
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: Output deployment URL
        run: |
          echo "🎉 Deployment successful!"
          echo "URL: ${{ steps.deployment.outputs.page_url }}"
